name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3
      TF_VAR_aws_region: eu-west-3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip || python -m ensurepip --upgrade || true
          python -m pip install -r lambda/requirements.txt || (python -m ensurepip --upgrade && python -m pip install -r lambda/requirements.txt)

      - name: Build Lambda package
        run: |
          chmod +x scripts/build_lambda.sh
          ./scripts/build_lambda.sh

      - name: Terraform init
        run: terraform -chdir=terraform init -input=false

      - name: Setup Infracost
        if: ${{ secrets.INFRACOST_API_KEY != '' }}
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost breakdown
        if: ${{ secrets.INFRACOST_API_KEY != '' }}
        run: |
          terraform -chdir=terraform plan -input=false -no-color -out=tfplan
          infracost breakdown --path=terraform --format=table

      - name: Skip Infracost
        if: ${{ secrets.INFRACOST_API_KEY == '' }}
        run: echo "Infracost secret not configured; skipping cost estimation."

      - name: Terraform plan
        run: terraform -chdir=terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=terraform apply -auto-approve -input=false tfplan
