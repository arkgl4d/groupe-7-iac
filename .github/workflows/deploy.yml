name: deploy.ci

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. L'action configure seule les variables AWS temporaires pour la suite
      - name: Configure AWS Credentials (Assume Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      # Ajusté en 3.11 conformément au sujet d'évaluation Ynov
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Nettoyage et fiabilisation de l'installation du handler Lambda
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f lambda/requirements.txt ]; then
            python -m pip install -r lambda/requirements.txt
          fi

      - name: Build Lambda package
        run: |
          chmod +x scripts/build_lambda.sh
          ./scripts/build_lambda.sh

      - name: Terraform init
        run: terraform -chdir=terraform init -input=false

      # Vérification de la présence de la clé Infracost
      - name: Check Infracost secret
        id: infracost-check
        shell: bash
        run: |
          if [ -n "${{ secrets.INFRACOST_API_KEY }}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Infracost secret not configured; skipping cost estimation."
          fi

      - name: Setup Infracost
        if: ${{ steps.infracost-check.outputs.should_run == 'true' }}
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost breakdown
        if: ${{ steps.infracost-check.outputs.should_run == 'true' }}
        run: |
          terraform -chdir=terraform plan -input=false -no-color -out=tfplan
          infracost breakdown --path=terraform --format=table

      # Plus aucun bloc 'env:' ici, Terraform utilise les accès générés par l'Assume Role
      - name: Terraform plan
        run: terraform -chdir=terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=terraform apply -auto-approve -input=false tfplan