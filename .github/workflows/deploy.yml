name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # =========================================================================
  # JOB 1 : CHECK (CI)
  # =========================================================================
  validate:
    name: Lint & Validate (CI)
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Imposé par le sujet Ynov

      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init & validate
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_VARIABLE }}

      - name: Generate Infracost cost estimate
        run: |
          infracost breakdown --path=terraform/ \
                              --format=table
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          directory: terraform/
          soft_fail: true # Permet de ne pas bloquer le pipeline pour des alertes mineures d'école

      - name: Install Ansible Lint & Dependencies locally
        run: |
          pip install ansible-lint ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run Ansible Lint (CLI Local)
        run: ansible-lint ansible/

  # =========================================================================
  # JOB 2 : DÉPLOIEMENT & CONFIGURATION (CD) - Version Temporaire / Fast-Pass
  # =========================================================================
  deploy:
    name: Deploy & Configure (CD)
    needs: validate # <-- CHAÎNAGE : Ce job attend que 'validate' soit un succès
    # S'exécute uniquement lors d'un vrai push sur les branches principales (pas sur les Pull Requests)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

    steps:
      # 1. RÉCUPÉRATION DU CODE SOURCE (Obligatoire en premier !)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. CONFIGURATION DES ACCÈS AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }} # <-- Réactivé ici !
          role-skip-session-tagging: true

      # 3. INSTALLATION SYSTÈME NATIVE DE TERRAFORM
      - name: Install Terraform CLI natively
        run: |
          sudo apt-get update && sudo apt-get install -y gnupg software-properties-common wget
          wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y terraform=1.10.5-1

      # 5. CRÉATION DU ZIP FACTICE POUR ÉVITER LE CRASH DE FILEBASE64
      - name: Create dummy zip for Terraform initial pass
        run: |
          mkdir -p terraform
          echo "# dummy" > dummy.py
          zip -q terraform/lambda_package.zip dummy.py
          rm dummy.py

      # 6. INITIALISATION ET DEPLOIEMENT TERRAFORM
      - name: Terraform Init
        run: |
          rm -rf .terraform .terraform.lock.hcl terraform.tfstate*
          terraform init \
            -input=false \
            -reconfigure \
            -backend-config="bucket=tf-state-group7-ynov" \
            -backend-config="key=group7/terraform.tfstate" \
            -backend-config="region=eu-west-1"
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ./terraform

      - name: Capture Lambda role ARN
        id: lambda_role
        run: |
          echo "role_arn=$(terraform output -raw lambda_role_arn)" >> "$GITHUB_OUTPUT"
        working-directory: ./terraform

      # 7. PRÉPARATION DE PYTHON POUR ANSIBLE
      - name: Setup Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 8. INSTALLATION DES DÉPENDANCES ET COLLECTIONS ANSIBLE
      - name: Install Ansible & AWS Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws
          ansible-galaxy collection install community.general

      # 9. EXÉCUTION DU PLAYBOOK ANSIBLE
      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i "localhost," -c local ansible/playbook.yml