---
name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  # =========================================================================
  # JOB 1 : VALIDATION (CI) - Étape B complétée
  # =========================================================================
  validate:
    name: Lint & Validate (CI)
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Imposé par le sujet Ynov

      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init & validate
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          directory: terraform/
          soft_fail: true # Permet de ne pas bloquer le pipeline pour des alertes mineures d'école

      - name: Run Ansible Lint
        uses: ansible/ansible-lint@main # <-- La syntaxe officielle actuelle
        with:
          targets: |
            ansible/

  # =========================================================================
  # JOB 2 : DÉPLOIEMENT & CONFIGURATION (CD) - Étape A
  # =========================================================================
  deploy:
    name: Deploy & Configure (CD)
    needs: validate # <-- CHAÎNAGE : Ce job attend que 'validate' soit un succès
    # S'exécute uniquement lors d'un vrai push sur les branches principales (pas sur les Pull Requests)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      # Utilisation du vrai backend S3 persistant pour l'apply
      - name: Terraform Init & Apply
        run: |
          terraform -chdir=terraform init -input=false
          terraform -chdir=terraform apply -auto-approve -input=false

      # Préparation de l'environnement Python pour Ansible
      - name: Setup Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installation des dépendances pour qu'Ansible puisse parler à AWS (boto3)
      - name: Install Ansible & AWS Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws

      # Lancement du Playbook Ansible pour mettre à jour le code de la Lambda
      - name: Run Ansible Playbook
        run: |-
          # On utilise localhost comme inventaire car on pilote l'API AWS directement depuis le runner
          ansible-playbook -i "localhost," ansible/playbook.yml
