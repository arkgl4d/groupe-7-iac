name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Validate (CI)
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Aligné avec la version demandée par le sujet

      # 1. Vérification du formatage Terraform
      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive

      # 2. Validation de la syntaxe Terraform
      - name: Terraform init & validate
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate

      # 3. ANALYSE DE SÉCURITÉ : Checkov (Exigence du sujet)
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          directory: terraform/
          # soft_fail: true # Décommente cette ligne si Checkov bloque ton pipeline pour des alertes mineures AWS d'école

      # 4. QUALITÉ DU CODE ANSIBLE : Ansible Lint (Exigence du sujet)
      - name: Run Ansible Lint
        uses: ansibles/ansible-lint-action@v6
        with:
          targets: |
            ansible/

  deploy:
    name: Terraform Deploy & Ansible Update
    needs: validate # <-- CRUCIAL : Le déploiement ne se lance que si la validation réussit !
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Uniquement sur push main
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Terraform Init & Apply
        run: |
          terraform -chdir=terraform init -input=false
          terraform -chdir=terraform apply -auto-approve -input=false

      # =========================================================================
      # LA BRIQUE MANQUANTE : ANSIBLE
      # =========================================================================
      - name: Install Ansible & AWS Collection
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws

      - name: Run Ansible Playbook to update Lambda
        run: |
          ansible-playbook -i localhost, ansible/playbook.yml