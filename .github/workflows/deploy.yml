---
name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  # =========================================================================
  # JOB 1 : VALIDATION (CI) - Étape B complétée
  # =========================================================================


  # =========================================================================
  # JOB 2 : DÉPLOIEMENT & CONFIGURATION (CD) - Étape A
  # =========================================================================

  deploy:
    name: Deploy & Configure (CD)
    needs: validate # <-- CHAÎNAGE : Ce job attend que 'validate' soit un succès
    # S'exécute uniquement lors d'un vrai push sur les branches principales (pas sur les Pull Requests)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

    steps:
          # Génère un zip factice pour que Terraform ne plante pas avant le passage d'Ansible
      - name: Create dummy zip for Terraform initial pass
        run: |
          mkdir -p terraform
          echo "# dummy" > dummy.py
          zip -q terraform/lambda_package.zip dummy.py
          rm dummy.py

      # Utilisation du vrai backend S3 persistant pour l'apply
      - name: Terraform Init & Apply
        run: |
          terraform -chdir=terraform init -input=false
          terraform -chdir=terraform apply -auto-approve -input=false

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-skip-session-tagging: true

      # =========================================================================
      # NETTOYAGE TEMPORAIRE MANUEL (À supprimer après ce run réussi)
      # =========================================================================
      - name: Manual cleanup of orphan IAM Role
        run: |
          echo "Tentative de suppression du rôle orphelin..."
          aws iam delete-role-policy --role-name groupe-7-iac-image-processor-role --policy-name groupe-7-iac-image-processor-policy || true
          aws iam delete-role --role-name groupe-7-iac-image-processor-role || true
          aws lambda delete-function --function-name groupe-7-iac-image-processor --region eu-west-3 || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      # Génère un zip factice pour que Terraform ne plante pas avant le passage d'Ansible
      - name: Create dummy zip for Terraform initial pass
        run: |
          mkdir -p terraform
          echo "# dummy" > dummy.py
          zip -q terraform/lambda_package.zip dummy.py
          rm dummy.py

      # Utilisation du vrai backend S3 persistant pour l'apply
      - name: Terraform Init & Apply
        run: |
          terraform -chdir=terraform init -input=false
          terraform -chdir=terraform apply -auto-approve -input=false

      # Préparation de l'environnement Python pour Ansible
      - name: Setup Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installation des dépendances pour qu'Ansible puisse parler à AWS (boto3)
      - name: Install Ansible & AWS Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws

      # Lancement du Playbook Ansible pour mettre à jour le code de la Lambda
      - name: Run Ansible Playbook
        run: |-
          # On utilise localhost comme inventaire car on pilote l'API AWS directement depuis le runner
          ansible-playbook -i "localhost," ansible/playbook.yml
