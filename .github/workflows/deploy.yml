name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3
      TF_VAR_aws_region: eu-west-3
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip || python -m ensurepip --upgrade || true
          python -m pip install -r lambda/requirements.txt || (python -m ensurepip --upgrade && python -m pip install -r lambda/requirements.txt)

      - name: Build Lambda package
        run: |
          chmod +x scripts/build_lambda.sh
          ./scripts/build_lambda.sh

      - name: Assume AWS role
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
        run: |
          set -e
          if [ -n "$AWS_ROLE_EXTERNAL_ID" ]; then
            CREDENTIALS=$(aws sts assume-role --role-arn "$AWS_ROLE_ARN" --role-session-name github-actions-deploy --external-id "$AWS_ROLE_EXTERNAL_ID" --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
          else
            CREDENTIALS=$(aws sts assume-role --role-arn "$AWS_ROLE_ARN" --role-session-name github-actions-deploy --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
          fi
          read -r ACCESS_KEY SECRET_KEY SESSION_TOKEN <<< "$CREDENTIALS"
          echo "AWS_ACCESS_KEY_ID=$ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$SECRET_KEY" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$SESSION_TOKEN" >> "$GITHUB_ENV"

      - name: Terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
          AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        run: terraform -chdir=terraform init -input=false

      - name: Check Infracost secret
        id: infracost-check
        shell: bash
        run: |
          if [ -n "${{ secrets.INFRACOST_API_KEY }}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Infracost secret not configured; skipping cost estimation."
          fi

      - name: Setup Infracost
        if: ${{ steps.infracost-check.outputs.should_run == 'true' }}
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost breakdown
        if: ${{ steps.infracost-check.outputs.should_run == 'true' }}
        run: |
          terraform -chdir=terraform plan -input=false -no-color -out=tfplan
          infracost breakdown --path=terraform --format=table

      - name: Terraform plan
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
          AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        run: terraform -chdir=terraform plan -out=tfplan

      - name: Terraform apply
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
          AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        run: terraform -chdir=terraform apply -auto-approve -input=false tfplan
