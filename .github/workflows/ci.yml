name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: eu-west-3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip || python -m ensurepip --upgrade || true
          python -m pip install -r lambda/requirements.txt || (python -m ensurepip --upgrade && python -m pip install -r lambda/requirements.txt)

      - name: Build Lambda package
        run: |
          chmod +x scripts/build_lambda.sh
          ./scripts/build_lambda.sh

      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Check Infracost secret
        id: infracost-check
        shell: bash
        run: |
          if [ -n "${{ secrets.INFRACOST_API_KEY }}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Infracost secret not configured; skipping cost estimation."
          fi

      - name: Setup Infracost
        if: ${{ steps.infracost-check.outputs.should_run == 'true' }}
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost breakdown
        if: ${{ steps.infracost-check.outputs.should_run == 'true' }}
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform plan -input=false -no-color -out=tfplan
          infracost breakdown --path=terraform --format=table
