name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ÉTAPE CLÉ : On injecte l'Assume Role une bonne fois pour toutes pour le job
      - name: Configure AWS Credentials (Assume Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      # Ajusté en 3.11 conformément au sujet d'évaluation Ynov
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f lambda/requirements.txt ]; then
            python -m pip install -r lambda/requirements.txt
          fi

      - name: Build Lambda package
        run: |
          chmod +x scripts/build_lambda.sh
          ./scripts/build_lambda.sh

      # On effectue le format check AVANT l'init (bonne pratique)
      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      # Vérification de la clé Infracost
      - name: Check Infracost secret
        id: infracost-check
        shell: bash
        run: |
          if [ -n "${{ secrets.INFRACOST_API_KEY }}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Infracost secret not configured; skipping cost estimation."
          fi

      - name: Setup Infracost
        if: ${{ steps.infracost-check.outputs.should_run == 'true' }}
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # Génération du plan et analyse du coût sans bloc env: superflu
      - name: Infracost breakdown
        if: ${{ steps.infracost-check.outputs.should_run == 'true' }}
        run: |
          terraform -chdir=terraform plan -input=false -no-color -out=tfplan
          infracost breakdown --path=terraform --format=table