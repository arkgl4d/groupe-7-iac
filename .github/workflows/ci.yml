name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: eu-west-3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r lambda/requirements.txt

      - name: Build Lambda package
        run: |
          chmod +x scripts/build_lambda.sh
          ./scripts/build_lambda.sh

      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Setup Infracost
        if: ${{ vars.infracost_variable != '' }}
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ vars.infracost_variable }}

      - name: Infracost breakdown
        if: ${{ vars.infracost_variable != '' }}
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform plan -input=false -no-color -out=tfplan
          infracost breakdown --path=terraform --format=table

      - name: Skip Infracost
        if: ${{ vars.infracost_variable == '' }}
        run: echo "Infracost variable not configured; skipping cost estimation."
