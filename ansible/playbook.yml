---
- name: Package and deploy Lambda handler
  hosts: localhost
  gather_facts: false

  vars:
    lambda_name: "groupe-7-iac-image-processor"
    project_root: "{{ playbook_dir }}/.."
    lambda_package_path: "{{ project_root }}/terraform/lambda_package.zip"
    lambda_build_dir: "{{ project_root }}/.lambda_build"
    handler_path: "{{ project_root }}/lambda/handler.py"
    requirements_path: "{{ project_root }}/lambda/requirements.txt"
    aws_region: "eu-west-3"
    lambda_role_arn: "{{ lookup('env', 'LAMBDA_ROLE_ARN') | default(omit) }}"

  tasks:
    - name: Ensure package build directory exists
      ansible.builtin.file:
        path: "{{ lambda_build_dir }}"
        state: directory
        mode: "0755"

    - name: Install Lambda dependencies
      ansible.builtin.pip:
        requirements: "{{ requirements_path }}"
        extra_args: >-
          --quiet 
          --target={{ lambda_build_dir }} 
          --platform manylinux2014_x86_64 
          --only-binary=:all:

    - name: Copy Lambda handler into build directory
      ansible.builtin.copy:
        src: "{{ handler_path }}"
        dest: "{{ lambda_build_dir }}/handler.py"
        mode: "0644"

    - name: Create Lambda deployment package archive via Shell
      ansible.builtin.shell: |
        cd "{{ lambda_build_dir }}" && zip -r "{{ lambda_package_path }}" .
      changed_when: true

    - name: Update Lambda function code and configuration via AWS CLI
      ansible.builtin.shell: |
        aws lambda update-function-code \
          --function-name "{{ lambda_name }}" \
          --zip-file "fileb://{{ lambda_package_path }}" \
          --region "{{ aws_region }}"

        # PAUSE INTELLIGENTE : Attend que la mise à jour du code soit effective
        aws lambda wait function-updated \
          --function-name "{{ lambda_name }}" \
          --region "{{ aws_region }}"

        aws lambda update-function-configuration \
          --function-name "{{ lambda_name }}" \
          --runtime "python3.11" \
          --region "{{ aws_region }}"
      changed_when: true # noqa: yaml[new-line-at-end-of-file]